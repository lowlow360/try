name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install pyinstaller
      
    - name: Build EXE
      run: pyinstaller --noconsole --onefile smaple.py
      
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Attendance-Calculator-EXE
        path: dist/smaple.exe

